<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa en tiempo real</title>

  <!-- Leaflet CSS + JS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- Socket.IO (servido por tu backend en Render) -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Tus estilos -->
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Mapa en tiempo real</h1>
      <p id="title" class="small"></p>
    </div>
    <div id="map" class="card"></div>
  </div>

  <!-- Scripts del viewer -->
  <script src="./js/common.js"></script>
  <script src="./js/viewer.js"></script>

  <!-- (Opcional) Si quieres la barra definida en HTML (el JS también la crea solo)
  <div id="liveStatusBar" class="status-offline">
    <div id="liveStatusDot"></div>
    <div id="liveStatusText">🔴 Detenido</div>
  </div>
  -->
</body>
</html>
