
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Panel Admin</h1>
      <p class="small">Para demo, hay 2 transportes y 2 usuarios. Puedes asignar el tracker a un transporte.</p>
    </div>

    <div class="card">
      <h3>Login Admin</h3>
      <div class="label">Email</div>
      <input id="aemail" value="admin@demo.com"/>
      <div class="label">Contraseña</div>
      <input id="apass" type="password" value="admin123"/>
      <p></p>
      <button class="btn" id="alogin">Entrar</button>
      <p id="amsg" class="small"></p>
    </div>

    <div class="card">
      <h3>Asignaciones</h3>
      <div class="label">Transporte</div>
      <select id="tselect">
        <option value="t1">t1</option>
        <option value="t2">t2</option>
      </select>
      <div class="label">Usuario (tracker)</div>
      <select id="uselect">
        <option value="u2">driver@demo.com</option>
      </select>
      <p></p>
      <button class="btn" id="assign" disabled>Asignar</button>
      <p id="asmsg" class="small"></p>
    </div>
  </div>

  <script src="./js/admin.js"></script>
</body>
</html>
